[tool.black]
line-length = 79
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | \.pytest_cache
  | __pycache__
)/
'''

[tool.pytest.ini_options]
# Configuración profesional de Pytest
pythonpath = ["."]
testpaths = ["tests"]
python_files = ["test_*.py"]
